<body>
    <form action="contact.php" method="POST" class="contact-form">
        <section class="s2">
            <h2>Formulaire de Contact</h2>
            <div class="div1">
                <label for="name">Nom</label>
                <input type="text" id="name" name="name" placeholder="Votre nom" required>
            </div>

            <div class="div1">
                <label for="prenom">Prenom</label>
                <input type="text" id="prenom" name="prenom" placeholder="Votre  prenom" required>
            </div>

            <div class="div1">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Votre email" required>
            </div>
            
            <div class="div1">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" placeholder="Votre mot de passe" required>
            </div>
    
            <div class="div1">
                <label for="confirmPassword">Vérifier le mot de passe</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirmez votre mot de passe" required>
            </div>
            <button type="submit" class="btn" >Envoyer</button>
        </section>
